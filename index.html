<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>876 MEDIA EAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .menu-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .add-btn { background: #f97316; color: white; font-weight: 900; padding: 10px 20px; border-radius: 10px; }
        #cart-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #222; padding: 20px; display: none; border-top: 2px solid #f97316; }
    </style>
</head>
<body class="p-4 pb-40">

    <header class="text-center py-10">
        <h1 class="text-4xl font-black text-orange-500 italic">876 MEDIA EAT</h1>
        <p class="text-zinc-500 text-xs tracking-widest mt-2 uppercase">Montego Bay, Jamaica</p>
    </header>

    <div class="max-w-md mx-auto">
        <div class="menu-card">
            <div><p class="font-bold">Quarter Jerk Chicken</p><p class="text-orange-500">$1,200</p></div>
            <button onclick="addItem('Jerk Chicken', 1200)" class="add-btn">ADD +</button>
        </div>

        <div class="menu-card">
            <div><p class="font-bold">Jerk Pork (1/2 lb)</p><p class="text-orange-500">$1,500</p></div>
            <button onclick="addItem('Jerk Pork', 1500)" class="add-btn">ADD +</button>
        </div>

        <div class="menu-card">
            <div><p class="font-bold">Boston Bay Sausage</p><p class="text-orange-500">$900</p></div>
            <button onclick="addItem('Sausage', 900)" class="add-btn">ADD +</button>
        </div>

        <div class="menu-card">
            <div><p class="font-bold">876 Jerk Burger</p><p class="text-orange-500">$1,400</p></div>
            <button onclick="addItem('Burger', 1400)" class="add-btn">ADD +</button>
        </div>

        <div class="menu-card">
            <div><p class="font-bold">Veggie Jerk Pizza</p><p class="text-orange-500">$1,800</p></div>
            <button onclick="addItem('Veggie Pizza', 1800)" class="add-btn">ADD +</button>
        </div>

        <div class="mt-10 mb-4 text-zinc-500 text-xs font-bold uppercase tracking-widest">Cool Down</div>

        <div class="menu-card">
            <div><p class="font-bold">Red Stripe</p><p class="text-orange-500">$500</p></div>
            <button onclick="addItem('Red Stripe', 500)" class="add-btn">ADD +</button>
        </div>

        <div class="menu-card">
            <div><p class="font-bold">Coconut Water</p><p class="text-orange-500">$400</p></div>
            <button onclick="addItem('Coconut Water', 400)" class="add-btn">ADD +</button>
        </div>

        <div class="mt-10">
            <p class="text-xs text-zinc-500 mb-2">SPECIAL NOTES (No onions, etc.)</p>
            <textarea id="notes" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl text-sm" placeholder="Optional notes..."></textarea>
        </div>
    </div>

    <div id="cart-footer">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div>
                <p id="total-text" class="text-2xl font-black leading-none">$0</p>
                <button onclick="resetCart()" class="text-xs text-zinc-500 mt-2 uppercase">Clear All</button>
            </div>
            <button onclick="sendOrder()" class="bg-white text-black px-8 py-3 rounded-xl font-black uppercase italic">Order Now</button>
        </div>
    </div>

    <script>

        const FORMSPREE_URL = "https://formspree.io/f/maqleaqv";
        let order = [];

        function addItem(name, price) {
            order.push({ name, price });
            updateCart();
        }

        function resetCart() {
            order = [];
            updateCart();
        }

        function updateCart() {
            const footer = document.getElementById('cart-footer');
            const totalDisplay = document.getElementById('total-text');
            
            if (order.length > 0) {
                footer.style.display = 'block';
            } else {
                footer.style.display = 'none';
            }

            let total = 0;
            order.forEach(item => total += item.price);
            totalDisplay.innerText = "$" + total.toLocaleString();
        }
